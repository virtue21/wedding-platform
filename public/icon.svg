<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: rounded square with rose gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E06085;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C04070;stop-opacity:1" />
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" ry="112" fill="white" opacity="0.06"/>

  <!-- Elegant serif N -->
  <!-- Left vertical stroke -->
  <rect x="118" y="118" width="58" height="276" rx="6" fill="white"/>
  <!-- Right vertical stroke -->
  <rect x="336" y="118" width="58" height="276" rx="6" fill="white"/>
  <!-- Diagonal stroke (top-left to bottom-right) — made of a parallelogram -->
  <polygon points="176,118 234,118 336,394 278,394" fill="white"/>

  <!-- Small decorative serif feet -->
  <rect x="100" y="374" width="94" height="20" rx="8" fill="white" opacity="0.9"/>
  <rect x="318" y="374" width="94" height="20" rx="8" fill="white" opacity="0.9"/>
  <rect x="100" y="118" width="94" height="20" rx="8" fill="white" opacity="0.9"/>
  <rect x="318" y="118" width="94" height="20" rx="8" fill="white" opacity="0.9"/>
</svg>
